<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Project Template Comparison</title>
  <desc id="desc">A comparison graphic showing Basic Kanban, Automated Kanban, Bug Triage, and Team Planning templates.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d7dde8; stroke-width: 2; rx: 18; }
      .header { fill: #243b53; }
      .headerText { fill: #ffffff; font: 700 28px Arial, sans-serif; }
      .title { fill: #102a43; font: 700 22px Arial, sans-serif; }
      .body { fill: #243b53; font: 16px Arial, sans-serif; }
      .label { fill: #627d98; font: 13px Arial, sans-serif; }
      .basic { fill: #d9e2ec; }
      .auto { fill: #d9f0ff; }
      .bug { fill: #ffe7c2; }
      .plan { fill: #def7e5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="760"/>
  <rect class="panel" x="20" y="20" width="1560" height="720"/>
  <rect class="header" x="20" y="20" width="1560" height="82" rx="18"/>
  <text class="headerText" x="50" y="72">GitHub Project Template Comparison</text>
  <text class="label" x="50" y="96">Visual summary of the four commonly used project templates</text>

  <g transform="translate(55,135)">
    <rect class="panel" x="0" y="0" width="350" height="560"/>
    <rect class="basic" x="0" y="0" width="350" height="72" rx="18"/>
    <text class="title" x="20" y="42">Basic Kanban</text>
    <text class="body" x="20" y="115">Workflow</text>
    <text class="label" x="20" y="140">To Do → In Progress → Done</text>
    <text class="body" x="20" y="190">Automation</text>
    <text class="label" x="20" y="215">Minimal; manual movement of cards</text>
    <text class="body" x="20" y="265">Best fit</text>
    <text class="label" x="20" y="290">Small teams needing a simple visual board</text>
    <text class="body" x="20" y="340">Agile fit</text>
    <text class="label" x="20" y="365">Moderate</text>
  </g>

  <g transform="translate(435,135)">
    <rect class="panel" x="0" y="0" width="350" height="560"/>
    <rect class="auto" x="0" y="0" width="350" height="72" rx="18"/>
    <text class="title" x="20" y="42">Automated Kanban</text>
    <text class="body" x="20" y="115">Workflow</text>
    <text class="label" x="20" y="140">Backlog → Ready → In Progress → Review → Done</text>
    <text class="body" x="20" y="190">Automation</text>
    <text class="label" x="20" y="215">Issue movement and status updates can be automated</text>
    <text class="body" x="20" y="265">Best fit</text>
    <text class="label" x="20" y="290">Issue-driven projects with sprint delivery</text>
    <text class="body" x="20" y="340">Agile fit</text>
    <text class="label" x="20" y="365">High</text>
  </g>

  <g transform="translate(815,135)">
    <rect class="panel" x="0" y="0" width="350" height="560"/>
    <rect class="bug" x="0" y="0" width="350" height="72" rx="18"/>
    <text class="title" x="20" y="42">Bug Triage</text>
    <text class="body" x="20" y="115">Workflow</text>
    <text class="label" x="20" y="140">New → Needs Triage → Confirmed → In Progress → Done</text>
    <text class="body" x="20" y="190">Automation</text>
    <text class="label" x="20" y="215">Useful for bug classification and escalation</text>
    <text class="body" x="20" y="265">Best fit</text>
    <text class="label" x="20" y="290">Support and defect-management workflows</text>
    <text class="body" x="20" y="340">Agile fit</text>
    <text class="label" x="20" y="365">Moderate to low for feature delivery</text>
  </g>

  <g transform="translate(1195,135)">
    <rect class="panel" x="0" y="0" width="350" height="560"/>
    <rect class="plan" x="0" y="0" width="350" height="72" rx="18"/>
    <text class="title" x="20" y="42">Team Planning</text>
    <text class="body" x="20" y="115">Workflow</text>
    <text class="label" x="20" y="140">Backlog → Ready for Sprint → In Progress → Blocked → Done</text>
    <text class="body" x="20" y="190">Automation</text>
    <text class="label" x="20" y="215">Supports iteration planning and coordination</text>
    <text class="body" x="20" y="265">Best fit</text>
    <text class="label" x="20" y="290">Cross-functional teams with active sprint planning</text>
    <text class="body" x="20" y="340">Agile fit</text>
    <text class="label" x="20" y="365">High</text>
  </g>
</svg>
