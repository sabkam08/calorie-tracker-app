<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Calorie Tracker App Class Diagram</title>
  <desc id="desc">A simplified UML class diagram showing the main classes and their relationships.</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
      .header { fill: #e8f1ff; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
      .title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .text { font: 14px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #374151; }
      .line { stroke: #1f2937; stroke-width: 2.2; fill: none; }
      .label { font: 12px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937" />
    </marker>
    <marker id="diamond" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 6 0 L 12 6 L 6 12 L 0 6 z" fill="#1f2937" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="40" text-anchor="middle" class="title">Calorie Tracker App – Class Diagram</text>
  <text x="700" y="64" text-anchor="middle" class="small">Simplified visual export of the structural model</text>

  <!-- Boxes -->
  <rect x="80" y="110" width="240" height="190" class="box"/>
  <rect x="80" y="110" width="240" height="36" class="header"/>
  <text x="200" y="134" text-anchor="middle" class="title">UserProfile</text>
  <text x="100" y="170" class="text">userId</text>
  <text x="100" y="190" class="text">displayName</text>
  <text x="100" y="210" class="text">dailyCalorieGoal</text>
  <text x="100" y="240" class="small">+ setGoal()</text>
  <text x="100" y="258" class="small">+ reviewSummary()</text>

  <rect x="560" y="110" width="260" height="190" class="box"/>
  <rect x="560" y="110" width="260" height="36" class="header"/>
  <text x="690" y="134" text-anchor="middle" class="title">FoodCatalogue</text>
  <text x="580" y="170" class="text">catalogueId</text>
  <text x="580" y="190" class="text">sourceName</text>
  <text x="580" y="210" class="text">lastSyncedAt</text>
  <text x="580" y="240" class="small">+ searchByName()</text>
  <text x="580" y="258" class="small">+ addFoodItem()</text>

  <rect x="980" y="110" width="300" height="210" class="box"/>
  <rect x="980" y="110" width="300" height="36" class="header"/>
  <text x="1130" y="134" text-anchor="middle" class="title">FoodItem</text>
  <text x="1000" y="170" class="text">foodId</text>
  <text x="1000" y="190" class="text">name</text>
  <text x="1000" y="210" class="text">servingSize</text>
  <text x="1000" y="230" class="text">caloriesPerServing</text>
  <text x="1000" y="260" class="small">+ calculateCalories()</text>
  <text x="1000" y="278" class="small">+ updateNutritionFacts()</text>

  <rect x="90" y="420" width="270" height="200" class="box"/>
  <rect x="90" y="420" width="270" height="36" class="header"/>
  <text x="225" y="444" text-anchor="middle" class="title">MealLog</text>
  <text x="110" y="480" class="text">mealLogId</text>
  <text x="110" y="500" class="text">entryDate</text>
  <text x="110" y="520" class="text">mealType</text>
  <text x="110" y="540" class="text">totalCalories</text>
  <text x="110" y="570" class="small">+ addEntry()</text>
  <text x="110" y="588" class="small">+ recalculateTotal()</text>

  <rect x="490" y="420" width="250" height="180" class="box"/>
  <rect x="490" y="420" width="250" height="36" class="header"/>
  <text x="615" y="444" text-anchor="middle" class="title">MealEntry</text>
  <text x="510" y="480" class="text">entryId</text>
  <text x="510" y="500" class="text">portionSize</text>
  <text x="510" y="520" class="text">calories</text>
  <text x="510" y="550" class="small">+ updatePortion()</text>
  <text x="510" y="568" class="small">+ syncCalories()</text>

  <rect x="880" y="420" width="260" height="190" class="box"/>
  <rect x="880" y="420" width="260" height="36" class="header"/>
  <text x="1010" y="444" text-anchor="middle" class="title">NutritionGoal</text>
  <text x="900" y="480" class="text">goalId</text>
  <text x="900" y="500" class="text">dailyCalorieTarget</text>
  <text x="900" y="520" class="text">proteinTarget</text>
  <text x="900" y="540" class="text">effectiveDate</text>
  <text x="900" y="570" class="small">+ updateTargets()</text>
  <text x="900" y="588" class="small">+ validateGoal()</text>

  <rect x="1080" y="670" width="240" height="170" class="box"/>
  <rect x="1080" y="670" width="240" height="36" class="header"/>
  <text x="1200" y="694" text-anchor="middle" class="title">NutritionSummary</text>
  <text x="1100" y="730" class="text">summaryId</text>
  <text x="1100" y="750" class="text">periodStart</text>
  <text x="1100" y="770" class="text">remainingCalories</text>
  <text x="1100" y="800" class="small">+ buildFromLogs()</text>
  <text x="1100" y="818" class="small">+ calculateRemainingCalories()</text>

  <!-- Lines -->
  <path d="M 320 205 L 560 205" class="line" marker-end="url(#arrow)"/>
  <text x="438" y="192" class="label">owns</text>

  <path d="M 820 205 L 980 205" class="line" marker-end="url(#arrow)"/>
  <text x="890" y="192" class="label">stores</text>

  <path d="M 1090 300 L 740 420" class="line" marker-end="url(#arrow)"/>
  <text x="940" y="350" class="label">references</text>

  <path d="M 225 310 L 225 420" class="line" marker-end="url(#arrow)"/>
  <text x="237" y="370" class="label">contains</text>

  <path d="M 360 520 L 490 520" class="line" marker-end="url(#arrow)"/>
  <text x="410" y="508" class="label">composed of</text>

  <path d="M 1070 510 L 1140 670" class="line" marker-end="url(#arrow)"/>
  <text x="1095" y="610" class="label">summarised in</text>

  <path d="M 700 610 L 1080 740" class="line" marker-end="url(#arrow)"/>
  <text x="860" y="690" class="label">compares against</text>

  <path d="M 690 300 L 690 420" class="line" marker-end="url(#arrow)"/>
  <text x="702" y="365" class="label">adds items to</text>
</svg>

